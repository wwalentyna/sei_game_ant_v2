name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify required files
        shell: bash
        run: |
          test -f package.json || (echo "package.json is missing from the repository root" && exit 1)
          test -f package-lock.json || (echo "package-lock.json is missing. Copy it from the ZIP into the repository root." && exit 1)
          test -f src/App.tsx || (echo "src/App.tsx is missing. The src folder must be in the repository root." && exit 1)

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build Vite app
        run: npm run build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
