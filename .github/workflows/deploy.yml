name: Deploy prebuilt site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify prebuilt files
        shell: bash
        run: |
          test -f dist/index.html || (echo "dist/index.html is missing. Copy the dist folder from the ZIP into the repository root." && exit 1)
          test -d dist/assets || (echo "dist/assets is missing. Copy the full dist folder from the ZIP into the repository root." && exit 1)

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
